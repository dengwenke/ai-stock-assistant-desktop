name: Desktop Release

on:
  push:
    tags:
      - 'v*'
      - 'desktop-v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  windows-release:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build and publish GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_UPDATE_OWNER: ${{ github.repository_owner }}
          GH_UPDATE_REPO: ${{ github.event.repository.name }}
        run: npm run release:win:github
